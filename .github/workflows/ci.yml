name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax checks
        run: |
          node --check dashboard.js
          node --check deepseek-parser.js

      - name: Parser tests
        run: node --test tests/deepseek-parser.test.js
